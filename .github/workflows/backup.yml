name: Backup Supabase data

# Denní záloha obsahu appky ze Supabase do repa:
#  - tabulky recipes / staples / cart  -> backups/latest.json
#  - fotky receptů (bucket recipe-photos) -> backups/photos/
# Historie commitů = záloha ke každému dni (Git si drží všechny verze).

on:
  schedule:
    - cron: '0 2 * * *'   # každý den ve 02:00 UTC (~03:00–04:00 ČR)
  workflow_dispatch:        # ruční spuštění tlačítkem v záložce Actions

permissions:
  contents: write

jobs:
  backup:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: https://onrpnmhrwyeupltazime.supabase.co
      SERVICE_ROLE: ${{ secrets.SUPABASE_SERVICE_ROLE }}
      BUCKET: recipe-photos
    steps:
      - uses: actions/checkout@v4

      - name: Záloha tabulek -> backups/latest.json
        run: |
          set -euo pipefail
          mkdir -p backups
          fetch() {
            curl -sS -f \
              -H "apikey: $SERVICE_ROLE" \
              -H "Authorization: Bearer $SERVICE_ROLE" \
              "$SUPABASE_URL/rest/v1/$1?select=*"
          }
          RECIPES=$(fetch recipes)
          STAPLES=$(fetch staples)
          CART=$(fetch cart)
          # Bez časového otisku v souboru -> commit jen při reálné změně dat (čas je v commitu).
          jq -n \
            --argjson recipes "$RECIPES" \
            --argjson staples "$STAPLES" \
            --argjson cart "$CART" \
            '{recipes: $recipes, staples: $staples, cart: $cart}' \
            > backups/latest.json
          echo "Recepty: $(jq 'length' <<<"$RECIPES"), suroviny: $(jq 'length' <<<"$STAPLES")"

      - name: Záloha fotek -> backups/photos/
        run: |
          set -euo pipefail
          mkdir -p backups/photos
          LIST=$(curl -sS -f \
            -H "apikey: $SERVICE_ROLE" \
            -H "Authorization: Bearer $SERVICE_ROLE" \
            -H "Content-Type: application/json" \
            -X POST "$SUPABASE_URL/storage/v1/object/list/$BUCKET" \
            -d '{"prefix":"","limit":1000,"sortBy":{"column":"name","order":"asc"}}')
          COUNT=$(jq 'length' <<<"$LIST")
          echo "Fotek v bucketu: $COUNT"
          jq -r '.[] | select(.id != null) | .name' <<<"$LIST" | while IFS= read -r name; do
            [ -z "$name" ] && continue
            curl -sS -f -o "backups/photos/$name" \
              "$SUPABASE_URL/storage/v1/object/public/$BUCKET/$name" \
              || echo "Nepodařilo se stáhnout: $name"
          done

      - name: Commit při změně
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backups
          if git diff --cached --quiet; then
            echo "Žádná změna dat ani fotek — commit se nedělá."
          else
            git commit -m "backup: Supabase snapshot $(date -u +%Y-%m-%d)"
            git push
          fi
